[project]
name = "llm-xml-parser"
version = "0.1.0"
description = "用于解析 LLM XML 输出的各种格式的 JSON"
readme = "README.md"
authors = [
    { name = "ChloeMa", email = "1328895134@qq.com" }
]
requires-python = ">=3.12"
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
]

[build-system]
requires = ["uv_build>=0.8.15,<0.9.0"]
build-backend = "uv_build"

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
